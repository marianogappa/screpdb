name: Release

# release-please tags AND publishes a GitHub release in the same instant. Firing
# on both `push: tags` and `release: published` launched two concurrent Release
# runs that raced to overwrite the same assets, intermittently 404ing and
# leaving a binary missing from the release. Trigger only on the published
# release; on that event github.ref_type/ref_name are still the tag, so the
# Scoop/Homebrew/minisign steps below behave identically.
on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: internal/dashboard/frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform release binaries
        run: make cross-binaries

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      # Bump the Homebrew formula in the dedicated marianogappa/homebrew-screpdb
      # tap so `brew upgrade screpdb` picks up the release. Requires a
      # HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on that repo — the
      # default GITHUB_TOKEN cannot push cross-repo). See RELEASING.md for setup.
      # Best-effort: skips cleanly if the secret is absent and never fails the
      # release.
      - name: Update Homebrew formula
        if: github.ref_type == 'tag'
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set; skipping Homebrew formula bump. See RELEASING.md."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          TAP_DIR="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/marianogappa/homebrew-screpdb.git" "$TAP_DIR"
          mkdir -p "$TAP_DIR/Formula"
          ./scripts/update-homebrew-formula.sh "$VERSION" dist/SHA256SUMS "$TAP_DIR/Formula/screpdb.rb"
          git -C "$TAP_DIR" config user.name "github-actions[bot]"
          git -C "$TAP_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage first, then diff the index: `git diff` alone ignores untracked
          # files, so on a fresh/empty tap the brand-new formula would look
          # unchanged and never get committed.
          git -C "$TAP_DIR" add Formula/screpdb.rb
          if git -C "$TAP_DIR" diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git -C "$TAP_DIR" commit -m "screpdb ${VERSION}"
          git -C "$TAP_DIR" push origin HEAD

      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::warning::MINISIGN_SECRET_KEY secret not set; skipping minisign signature."
            echo "::warning::See README 'Verifying downloads on Windows' for one-time setup."
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$KEYFILE"
          cd dist
          minisign -S -s "$KEYFILE" -m SHA256SUMS

      - name: Upload release binaries and checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/screpdb-windows-amd64.exe
            dist/screpdb-gui-windows-amd64.exe
            dist/screpdb-linux-amd64
            dist/screpdb-linux-arm64
            dist/screpdb-darwin-amd64
            dist/screpdb-darwin-arm64
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload minisign signature (when present)
        if: hashFiles('dist/SHA256SUMS.minisig') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SHA256SUMS.minisig
          fail_on_unmatched_files: true

      # Mint a GitHub App installation token for the Scoop bump. A PR opened by
      # the default GITHUB_TOKEN has its checks gated as `action_required` (needs
      # a manual "Approve workflows to run" click), which stalls auto-merge. A PR
      # opened by a GitHub App is a trusted actor, so its checks run automatically
      # and auto-merge can land it hands-off. Best-effort: if the SCOOP_APP_*
      # secrets are absent, this step's outputs are empty and the Scoop step falls
      # back to the default token (the old, approval-gated behaviour) rather than
      # failing the release.
      - name: Generate Scoop-bump app token
        id: scoop-app-token
        if: github.ref_type == 'tag'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SCOOP_APP_ID }}
          private-key: ${{ secrets.SCOOP_APP_PRIVATE_KEY }}

      # Regenerate the Scoop manifest from the freshly built binaries so
      # `scoop update screpdb` picks up the release. Runs LAST, after the release
      # artifacts are uploaded: a failure here must never strip binaries from the
      # release (an earlier version of this step, placed before the upload, hard-
      # failed and left a release with no assets). Branch protection rejects a
      # direct push to the default branch (the bot is not a bypass actor), so open
      # a PR instead. Opened as the GitHub App (see token step above) so its
      # required `test` check runs without manual approval and auto-merge lands it.
      - name: Update Scoop manifest
        if: github.ref_type == 'tag'
        env:
          APP_TOKEN: ${{ steps.scoop-app-token.outputs.token }}
          GH_TOKEN: ${{ steps.scoop-app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-main}"
          BRANCH="chore/scoop-bump-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # dist/SHA256SUMS is untracked, so it survives the checkout.
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          ./scripts/update-scoop-manifest.sh "$VERSION" dist/SHA256SUMS
          if git diff --quiet -- bucket/screpdb.json; then
            echo "Scoop manifest already up to date."
            exit 0
          fi
          git checkout -B "$BRANCH"
          git add bucket/screpdb.json
          git commit -m "chore(scoop): bump manifest to ${VERSION}"
          # Push as the App when its token is present so the PR's checks are not
          # approval-gated. `-c http.extraheader=` drops the default token's
          # persisted auth so the App token in the URL is the one that is used.
          if [ -n "${APP_TOKEN:-}" ]; then
            git -c http.extraheader= push --force-with-lease \
              "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH"
          else
            echo "::warning::SCOOP_APP_* secrets not set; pushing with the default token — the bump PR's checks will need manual approval."
            git push --force-with-lease origin "$BRANCH"
          fi
          if gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR for $BRANCH already open."
          else
            gh pr create --base "$DEFAULT_BRANCH" --head "$BRANCH" \
              --title "chore(scoop): bump manifest to ${VERSION}" \
              --body "Automated Scoop manifest bump for v${VERSION} so \`scoop install\`/\`scoop update screpdb\` resolves the current release."
          fi
          gh pr merge "$BRANCH" --auto --squash || echo "::warning::Could not enable auto-merge; merge the Scoop bump PR manually."
