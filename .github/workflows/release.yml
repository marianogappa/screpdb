name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: internal/dashboard/frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform release binaries
        run: make cross-binaries

      # One-cycle transition shim: the GUI asset was renamed
      # screpdb-dashboard-windows-amd64.exe -> screpdb-gui-windows-amd64.exe.
      # Already-installed GUI binaries still self-update against the OLD asset
      # name (compiled in), so publish a byte-identical copy under the old name
      # for one release cycle. Remove this step (and the old-name upload below)
      # in the next release once existing installs have migrated.
      - name: Publish legacy GUI asset name (transition)
        working-directory: dist
        run: cp screpdb-gui-windows-amd64.exe screpdb-dashboard-windows-amd64.exe

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      # Regenerate the Scoop manifest from the freshly built binaries and commit
      # it to the default branch so `scoop update screpdb` picks up the release.
      # Best-effort: never fail the release if branch protection blocks the push
      # (the manifest can also be regenerated locally with the same script).
      - name: Update Scoop manifest
        if: github.ref_type == 'tag'
        continue-on-error: true
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # dist/SHA256SUMS is untracked, so it survives the checkout.
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          ./scripts/update-scoop-manifest.sh "$VERSION" dist/SHA256SUMS
          if git diff --quiet -- bucket/screpdb.json; then
            echo "Scoop manifest already up to date."
            exit 0
          fi
          git add bucket/screpdb.json
          git commit -m "chore(scoop): bump manifest to ${VERSION}"
          git push origin "$DEFAULT_BRANCH"

      # Bump the Homebrew formula in the marianogappa/homebrew-tap repo so
      # `brew upgrade screpdb` picks up the release. Requires a HOMEBREW_TAP_TOKEN
      # secret (a PAT with contents:write on that repo — the default GITHUB_TOKEN
      # cannot push cross-repo). Best-effort: skips cleanly if the secret is
      # absent and never fails the release.
      - name: Update Homebrew formula
        if: github.ref_type == 'tag'
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set; skipping Homebrew formula bump."
            echo "::warning::See README 'macOS' / 'Linux' install sections for tap setup."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          TAP_DIR="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/marianogappa/homebrew-tap.git" "$TAP_DIR"
          mkdir -p "$TAP_DIR/Formula"
          ./scripts/update-homebrew-formula.sh "$VERSION" dist/SHA256SUMS "$TAP_DIR/Formula/screpdb.rb"
          git -C "$TAP_DIR" config user.name "github-actions[bot]"
          git -C "$TAP_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git -C "$TAP_DIR" diff --quiet -- Formula/screpdb.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git -C "$TAP_DIR" add Formula/screpdb.rb
          git -C "$TAP_DIR" commit -m "screpdb ${VERSION}"
          git -C "$TAP_DIR" push origin HEAD

      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::warning::MINISIGN_SECRET_KEY secret not set; skipping minisign signature."
            echo "::warning::See README 'Verifying downloads on Windows' for one-time setup."
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$KEYFILE"
          cd dist
          minisign -S -s "$KEYFILE" -m SHA256SUMS

      - name: Upload release binaries and checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/screpdb-windows-amd64.exe
            dist/screpdb-gui-windows-amd64.exe
            dist/screpdb-dashboard-windows-amd64.exe
            dist/screpdb-linux-amd64
            dist/screpdb-linux-arm64
            dist/screpdb-darwin-amd64
            dist/screpdb-darwin-arm64
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload minisign signature (when present)
        if: hashFiles('dist/SHA256SUMS.minisig') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SHA256SUMS.minisig
          fail_on_unmatched_files: true
