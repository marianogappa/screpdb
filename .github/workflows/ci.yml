name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: internal/dashboard/frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run frontend tests
        run: make ui-test

      - name: Build embedded UI and cross-platform binaries
        run: make cross-binaries

      - name: Upload cross-platform binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-binaries
          path: dist/*

      - name: Run tests
        run: go test ./...

  # Windows Low-integrity containment (issue #237): asserts on a real Windows
  # kernel that the worker spawned via winsandbox.SpawnWorkerLow runs at Low
  # integrity and is refused writes outside the Low-labeled app-data dir. Gated
  # behind the `integration` build tag so it only runs here, not in the ubuntu
  # `go test ./...` above (where the Windows syscalls don't exist).
  windows-sandbox:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (Windows)
        run: go build ./...

      - name: Run Low-integrity containment integration test
        run: go test -tags integration -run TestLowIntegrityContainment ./internal/winsandbox/
